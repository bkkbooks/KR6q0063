front:
  text: 大慧禪師年譜序禪人祖詠編大慧禪師年譜敬菴黃汝霖以其先世入大慧室求余為序余曰雲駛月運舟行岸移編年雲也舟也月與岸又在學人高著眼大慧之名震天駭地道傳其徒遍滿天下不待余序而後彰余聞大慧嫡孫安永頌曰何處覓行蹤大地無寸土敬以是題諸編年首淳熙癸卯四月望日蓮社居士張掄序
